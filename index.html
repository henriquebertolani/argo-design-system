<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argo Design System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
   TOKENS (mínimos necessários)
========================= */

:root {

  --bg-default: #FFFFFF;
  --bg-muted: #EAEAEA;
  --bg-subtle: #F4F4F4;

  --border-default: #D0D0D0;
  --border-subtle: #E0E0E0;

  --feedback-neutral: #2F6BFF;
  --feedback-success: #1FA971;
  --feedback-warning: #E5533D;
  --feedback-attention: #F2A500;

  --feedback-inactive-surface: #F0F0F0;
  --feedback-inactive-icon: #A0A0A0;

  --radius-full: 999px;

  --border-s: 1px;

  font-family: "DM Sans", sans-serif;

}

/* =========================
   BASE BUTTON
========================= */

.btn {

  height: 36px;
  padding: 0 16px;

  background: var(--bg-default);

  border:
    var(--border-s)
    solid
    var(--border-default);

  border-radius: 6px;

  cursor: pointer;

  transition:
    border-color 0.2s,
    background 0.2s;

}

/* DEFAULT SEMPRE CINZA */

.btn-system,
.btn-success,
.btn-warning,
.btn-attention {

  border-color: var(--border-default);

}

/* HOVER */

.btn-system:hover {
  border-color: var(--feedback-neutral);
}

.btn-success:hover {
  border-color: var(--feedback-success);
}

.btn-warning:hover {
  border-color: var(--feedback-warning);
}

.btn-attention:hover {
  border-color: var(--feedback-attention);
}

/* DISABLED */

.btn.disabled {

  border-color: var(--border-subtle);
  color: #999;

  cursor: not-allowed;
  pointer-events: none;

}

/* =========================
   TOGGLE
========================= */

.toggle-wrap {

  display: inline-flex;
  align-items: center;

  cursor: pointer;

}

.toggle-track {

  width: 44px;
  height: 24px;

  border-radius: var(--radius-full);

  padding: 3px;

  display: flex;
  align-items: center;

  transition:
    background 0.2s,
    border-color 0.2s;

}

/* THUMB */

.toggle-thumb {

  width: 18px;
  height: 18px;

  border-radius: var(--radius-full);

  background: var(--bg-default);

  transition: transform 0.2s;

}

/* ON */

.toggle-track.on {

  background: var(--feedback-neutral);

}

.toggle-track.on .toggle-thumb {

  transform: translateX(20px);

}

/* OFF */

.toggle-track.off {

  background: var(--bg-muted);

  border:
    var(--border-s)
    solid
    var(--border-default);

}

/* DISABLED — VISUAL DIFERENTE */

.toggle-wrap.disabled {

  pointer-events: none;
  cursor: not-allowed;

}

.toggle-wrap.disabled .toggle-track {

  background: var(--feedback-inactive-surface);

  border:
    var(--border-s)
    solid
    var(--border-subtle);

}

.toggle-wrap.disabled .toggle-thumb {

  background: var(--feedback-inactive-icon);

}

/* LAYOUT SIMPLES */

body {

  padding: 40px;

  display: flex;
  flex-direction: column;
  gap: 24px;

}

.section {

  display: flex;
  gap: 12px;
  align-items: center;

}

</style>

</head>

<body>

<h2>Buttons</h2>

<div class="section">

<button class="btn btn-system">
System
</button>

<button class="btn btn-success">
Success
</button>

<button class="btn btn-warning">
Warning
</button>

<button class="btn btn-attention">
Attention
</button>

<button class="btn disabled">
Disabled
</button>

</div>

<h2>Toggle</h2>

<div class="section">

<label class="toggle-wrap">

<div class="toggle-track off">

<div class="toggle-thumb"></div>

</div>

</label>

<label class="toggle-wrap">

<div class="toggle-track on">

<div class="toggle-thumb"></div>

</div>

</label>

<label class="toggle-wrap disabled">

<div class="toggle-track off">

<div class="toggle-thumb"></div>

</div>

</label>

<label class="toggle-wrap disabled">

<div class="toggle-track on">

<div class="toggle-thumb"></div>

</div>

</label>

</div>

<script>

/* TOGGLE INTERACTION */

document
  .querySelectorAll(
    ".toggle-wrap:not(.disabled)"
  )
  .forEach(wrap => {

    wrap.addEventListener(
      "click",
      () => {

        const track =
          wrap.querySelector(
            ".toggle-track"
          );

        track.classList.toggle("on");
        track.classList.toggle("off");

      }
    );

  });

</script>

</body>
</html>
